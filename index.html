<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Homepage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1502790671504-542ad42d5189?auto=format&fit=crop&w=2560&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: #e2e8f0;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        .glass-panel { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); }
        .service-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .service-card:hover { background: rgba(30, 41, 59, 0.8); transform: translateY(-1px); }
        .bookmark-item { background: rgba(255, 255, 255, 0.03); display: flex; align-items: center; border-radius: 6px; overflow: hidden; margin-bottom: 4px; text-decoration: none; color: inherit; }
        .abbr { background: rgba(255, 255, 255, 0.05); padding: 6px 10px; font-weight: bold; font-size: 0.7rem; min-width: 45px; text-align: center; color: #94a3b8; border-right: 1px solid rgba(255,255,255,0.05); }
        .link-text { padding: 6px 12px; flex: 1; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .domain { opacity: 0.3; font-size: 0.75rem; }
        .icon-img { width: 22px; height: 22px; object-fit: contain; }

        /* Фиксация инлайнового вида для верхней панели */
        .header-inline-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: nowrap; /* Запрещаем перенос на новую строку */
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1440px] mx-auto mb-8 glass-panel p-3 px-6 rounded-2xl">
        <div class="header-inline-row">
            
            <div class="flex items-baseline gap-3 shrink-0">
                <div id="date" class="text-gray-400 text-[10px] md:text-xs font-medium uppercase tracking-widest">...</div>
                <div id="clock" class="text-2xl md:text-4xl font-bold text-white tracking-tighter leading-none">00:00</div>
            </div>

            <div class="hidden sm:flex border-l border-white/10 pl-4 flex-col leading-tight shrink-0">
                <span class="text-gray-500 text-[9px] uppercase">Holon, IL</span>
                <span id="weather" class="text-yellow-500 font-bold text-xs">...</span>
            </div>

            <div class="hidden lg:flex border-l border-white/10 pl-4 items-center gap-6 text-[10px] font-mono shrink-0">
                <div class="flex gap-3">
                    <div><span class="text-gray-500 mr-1 uppercase">USD:</span><span id="usd-rate" class="text-green-500 font-bold">...</span></div>
                    <div><span class="text-gray-500 mr-1 uppercase">EUR:</span><span id="eur-rate" class="text-blue-500 font-bold">...</span></div>
                </div>
                <div><span class="text-gray-500 mr-1 uppercase">IP:</span><span id="public-ip" class="text-purple-400 font-bold">...</span></div>
            </div>

            <div class="flex-grow max-w-md ml-4">
                <form action="https://www.google.com/search" method="GET" target="_blank">
                    <input type="text" name="q" placeholder="Search Google..." 
                           class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-1.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500/50 transition-all">
                </form>
            </div>
            
        </div>
    </div>

    <div class="max-w-[1440px] mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-8 mb-12">
            <section>
                <h2 class="text-xs font-bold mb-4 opacity-50 uppercase tracking-widest">My First Group</h2>
                <div class="space-y-2">
                    <a href="http://127.0.0.1:32400/" class="service-card p-3 rounded-xl flex items-center gap-4"><img src="https://www.plex.tv/wp-content/themes/plex/assets/img/plex-logo.svg" class="icon-img"><div class="flex flex-col"><span class="text-sm font-bold">Plex</span><span class="text-[10px] opacity-40">Plex Web 😎</span></div></a>
                    <a href="http://192.168.0.10:8096/" class="service-card p-3 rounded-xl flex items-center gap-4"><div class="w-5 h-5 flex items-center justify-center text-blue-400 font-bold text-[8px] border border-blue-400/30 rounded">JF</div><span class="text-sm font-bold">Jellyfin</span></a>
                    <a href="https://www.youtube.com/" class="service-card p-3 rounded-xl flex items-center gap-4"><div class="w-5 h-5 flex items-center justify-center text-red-500 font-bold text-[10px]">YT</div><span class="text-sm font-bold">YouTube</span></a>
                    <a href="https://disk.yandex.com/client/disk" class="service-card p-3 rounded-xl flex items-center gap-4"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f6/YandexDisk.png" class="icon-img"><span class="text-sm font-bold">Disk Yandex</span></a>
                </div>
            </section>
            
            <section>
                <h2 class="text-xs font-bold mb-4 opacity-50 uppercase tracking-widest">Live TV</h2>
                <div class="space-y-2">
                    <a href="https://www.mako.co.il/mako-vod-index" class="service-card p-3 rounded-xl flex items-center gap-4"><img src="https://img.mako.co.il/2024/10/10/logo-12-desktop.png" class="icon-img"><span class="text-sm font-bold">12 (Mako)</span></a>
                    <a href="https://13tv.co.il/live/" class="service-card p-3 rounded-xl flex items-center gap-4"><img src="https://media3.reshet.tv/image/upload/c_scale,h_35,f_auto,q_auto:best/v1723018309/uploads/2024/904188721.webp" class="icon-img"><span class="text-sm font-bold">13 (Reshet)</span></a>
                    <a href="https://www.kan.org.il/" class="service-card p-3 rounded-xl flex items-center gap-4"><div class="w-5 h-5 flex items-center justify-center text-blue-400 font-bold text-[10px]">KAN</div><span class="text-sm font-bold">KAN</span></a>
                </div>
            </section>

            <section>
                <h2 class="text-xs font-bold mb-4 opacity-50 uppercase tracking-widest">My Local Services</h2>
                <div class="space-y-2">
                    <a href="http://192.168.0.1/" class="service-card p-3 rounded-xl flex items-center gap-4"><span class="text-[10px] font-bold opacity-40">RT</span><span class="text-sm font-bold">Router</span></a>
                    <a href="http://192.168.0.160:8123/" class="service-card p-3 rounded-xl flex items-center gap-4"><img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/home-assistant.svg" class="icon-img"><span class="text-sm font-bold">Home Assistant</span></a>
                    <a href="http://192.168.0.160:3001/" class="service-card p-3 rounded-xl flex items-center gap-4"><img src="https://uptime.kuma.pet/img/icon.svg" class="icon-img"><span class="text-sm font-bold">Uptime Kuma</span></a>
                </div>
            </section>

            <section>
                <h2 class="text-xs font-bold mb-4 opacity-50 uppercase tracking-widest">Top Services</h2>
                <div class="space-y-2">
                    <a href="https://rutracker.org/" class="service-card p-3 rounded-xl flex items-center gap-4"><div class="w-5 h-5 bg-blue-600 rounded flex items-center justify-center text-[8px] font-bold">RU</div><span class="text-sm font-bold">rutracker</span></a>
                    <a href="https://rutor.info/" class="service-card p-3 rounded-xl flex items-center gap-4"><div class="w-5 h-5 bg-red-600 rounded flex items-center justify-center text-[8px] font-bold">RT</div><span class="text-sm font-bold">rutor</span></a>
                </div>
            </section>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateTime, 1000); updateTime();

        async function fetchInfo() {
            try {
                fetch('https://wttr.in/Holon?format=%t+%C').then(r => r.text()).then(t => document.getElementById('weather').textContent = t);
                fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json()).then(d => {
                    document.getElementById('usd-rate').textContent = `₪${d.rates.ILS.toFixed(2)}`;
                    document.getElementById('eur-rate').textContent = `₪${(d.rates.ILS / d.rates.EUR).toFixed(2)}`;
                });
                fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('public-ip').textContent = d.ip);
            } catch (e) { console.log('Fetch error'); }
        }
        fetchInfo();
    </script>
</body>
</html>
